version: 1
runtime:
  default: opencode
models:
  default: minimax-coding-plan/MiniMax-M3
  primary: minimax-coding-plan/MiniMax-M3
  backup: minimax-coding-plan/MiniMax-M3
execution:
  default_variant: high
  default_parallel: 1
  default_timeout: 12m
  default_retries: 1
planning:
  requirements_model: openai/gpt-5.5
  requirements_variant: high
  sprint_index_model: openai/gpt-5.6-sol
  sprint_index_variant: medium
  technical_handbook_model: openai/gpt-5.6-sol
  technical_handbook_variant: medium
  area_reasoning_model: openai/gpt-5.6-sol
  area_reasoning_variant: medium
  reasoning_model: openai/gpt-5.6-sol
  reasoning_variant: medium
  plan_model: openai/gpt-5.6-sol
  plan_variant: medium
logging:
  format: text
  level: debug
agentwrap:
  executable: opencode
  permission_default: allow
  required_health:
    - runtime_available
    - structured_output
    - workdir
